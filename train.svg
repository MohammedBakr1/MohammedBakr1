<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="800" height="140">
  <defs>
    <style>
      @keyframes ride {
        0%   { transform: translateX(800px); }
        100% { transform: translateX(-1100px); }
      }
      .train { animation: ride 14s linear infinite; }
      @keyframes s1anim {
        0%   { opacity: 1; transform: translate(0px,0px); }
        100% { opacity: 0; transform: translate(-6px,-28px); }
      }
      @keyframes s2anim {
        0%   { opacity: 1; transform: translate(0px,0px); }
        100% { opacity: 0; transform: translate(-4px,-22px); }
      }
      @keyframes s3anim {
        0%   { opacity: 1; transform: translate(0px,0px); }
        100% { opacity: 0; transform: translate(-8px,-16px); }
      }
      .s1 { animation: s1anim 1.4s ease-out infinite; }
      .s2 { animation: s2anim 1.4s ease-out 0.45s infinite; }
      .s3 { animation: s3anim 1.4s ease-out 0.9s infinite; }
    </style>
  </defs>

  <rect width="800" height="140" fill="#0d1117"/>

  <!-- track -->
  <line x1="0" y1="128" x2="800" y2="128" stroke="#30363d" stroke-width="2"/>
  <line x1="0"   y1="128" x2="0"   y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="50"  y1="128" x2="50"  y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="100" y1="128" x2="100" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="150" y1="128" x2="150" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="200" y1="128" x2="200" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="250" y1="128" x2="250" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="300" y1="128" x2="300" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="350" y1="128" x2="350" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="400" y1="128" x2="400" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="450" y1="128" x2="450" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="500" y1="128" x2="500" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="550" y1="128" x2="550" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="600" y1="128" x2="600" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="650" y1="128" x2="650" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="700" y1="128" x2="700" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="750" y1="128" x2="750" y2="135" stroke="#30363d" stroke-width="2"/>
  <line x1="800" y1="128" x2="800" y2="135" stroke="#30363d" stroke-width="2"/>

  <g class="train">
    <!-- دخان -->
    <text class="s1" x="14" y="16" font-family="Courier New" font-size="13" fill="#6e7681">(  )</text>
    <text class="s2" x="22" y="10" font-family="Courier New" font-size="11" fill="#484f58">( )</text>
    <text class="s3" x="10" y="5"  font-family="Courier New" font-size="10" fill="#30363d"> o </text>

    <!-- locomotive -->
    <text x="0" y="40"  font-family="Courier New" font-size="13" fill="#58a6ff">    ====        ________                ___________</text>
    <text x="0" y="56"  font-family="Courier New" font-size="13" fill="#58a6ff">_D _|  |_______/        \__I_I_____===__|_________|</text>
    <text x="0" y="72"  font-family="Courier New" font-size="13" fill="#7ee787"> |(_)---  |   H\________/ |   |        =|___ ___|  </text>
    <text x="0" y="88"  font-family="Courier New" font-size="13" fill="#7dcfff"> /     |  |   H  |  |     |   |         ||_| |_||  </text>
    <text x="0" y="104" font-family="Courier New" font-size="13" fill="#7dcfff">/      |  |   H  |  |     |   |         |  | |  |  </text>
    <text x="0" y="118" font-family="Courier New" font-size="13" fill="#f0883e">|  _______|_H___|__|_____|___/|_________|  |_|  |__</text>
    <text x="0" y="131" font-family="Courier New" font-size="13" fill="#58a6ff"> @   @                   @   @                @  @ </text>

    <!-- wagon 1 - LinkedIn -->
    <text x="358" y="56"  font-family="Courier New" font-size="13" fill="#0a66c2">+---------------+</text>
    <text x="358" y="72"  font-family="Courier New" font-size="13" fill="#0a66c2">|   LinkedIn    |</text>
    <text x="358" y="88"  font-family="Courier New" font-size="13" fill="#0a66c2">|    [ in ]     |</text>
    <text x="358" y="104" font-family="Courier New" font-size="13" fill="#0a66c2">|               |</text>
    <text x="358" y="118" font-family="Courier New" font-size="13" fill="#0a66c2">+---------------+</text>
    <text x="358" y="131" font-family="Courier New" font-size="13" fill="#58a6ff">   @         @  </text>

    <!-- wagon 2 - Email -->
    <text x="500" y="56"  font-family="Courier New" font-size="13" fill="#7ee787">+---------------+</text>
    <text x="500" y="72"  font-family="Courier New" font-size="13" fill="#7ee787">|    Email      |</text>
    <text x="500" y="88"  font-family="Courier New" font-size="13" fill="#7ee787">|  [>----@]     |</text>
    <text x="500" y="104" font-family="Courier New" font-size="13" fill="#7ee787">|               |</text>
    <text x="500" y="118" font-family="Courier New" font-size="13" fill="#7ee787">+---------------+</text>
    <text x="500" y="131" font-family="Courier New" font-size="13" fill="#58a6ff">   @         @  </text>

    <!-- wagon 3 - Mastodon -->
    <text x="642" y="56"  font-family="Courier New" font-size="13" fill="#6364ff">+---------------+</text>
    <text x="642" y="72"  font-family="Courier New" font-size="13" fill="#6364ff">|   Mastodon    |</text>
    <text x="642" y="88"  font-family="Courier New" font-size="13" fill="#6364ff">|   (( M ))     |</text>
    <text x="642" y="104" font-family="Courier New" font-size="13" fill="#6364ff">|               |</text>
    <text x="642" y="118" font-family="Courier New" font-size="13" fill="#6364ff">+---------------+</text>
    <text x="642" y="131" font-family="Courier New" font-size="13" fill="#58a6ff">   @         @  </text>
  </g>
</svg>
